<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat UI</title>

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='estilo-plantilla.css') }}">
</head>

<body>

<div class="chat-container">
    <div class="sidebar">
        <div class="settings-tray">
            <img class="profile-image" src="recursos/logo-perfil.jpg">
            <div>
                <i class="material-icons">cached</i>
                <i class="material-icons">message</i>
                <i class="material-icons">menu</i>
            </div>
        </div>

        <div class="search-box">
            <div class="input-wrapper">
                <i class="material-icons">search</i>
                <input type="text" placeholder="Buscar">
            </div>
        </div>

        <div class="chat-list">
            <div class="friend-drawer">
                <img src="recursos/logo2-perfil.jpg" class="profile-image">
                <div class="text">
                    <h6>Robo Cop</h6>
                    <p>Lorem ipsum dolor sit.</p>
                </div>
                <span class="time">13:00</span>
            </div>

            <hr class="m-0">

            <div class="friend-drawer">
                <img src="recursos/logo2-perfil.jpg" class="profile-image">
                <div class="text">
                    <h6>John Connor</h6>
                    <p>Mensaje de ejemplo.</p>
                </div>
                <span class="time">12:40</span>
            </div>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-header">
            <img class="profile-image" src="recursos/logo-perfil.jpg">
            <div class="ms-3">
                <h6 class="mb-0">Robo Cop</h6>
                <small class="text-muted">En línea</small>
            </div>
        </div>

        <div class="chat-box">
            <div class="message left">Hola!</div>
            <div class="message right">Qué onda</div>
            <div class="message left">Todo bien?</div>
        </div>

        <div class="input-chat">
            <div class="input-wrapper">
                <input type="text" placeholder="Escribe un mensaje">
                <i class="material-icons">send</i>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
