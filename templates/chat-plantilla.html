<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat UI</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='estilo-plantilla.css') }}">

</head>


<body>

<div class="chat-container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="settings-tray">

            <img class="profile-image"
            src="{{ url_for('static', filename='recursos/logo-perfil.jpg') }}">

            <div>
                <i class="material-icons">cached</i>
                <i class="material-icons">message</i>
                <i class="material-icons">menu</i>
            </div>

        </div>


        <div class="search-box">

            <div class="input-wrapper">

                <i class="material-icons">search</i>

                <input type="text" placeholder="Buscar">

            </div>

        </div>


        <!-- LISTA DE CONVERSACIONES -->
        <div class="chat-list" id="chatList">

        </div>

    </div>



    <!-- CHAT PRINCIPAL -->
    <div class="main-chat">

        <div class="chat-header">

            <img class="profile-image"
            src="{{ url_for('static', filename='recursos/logo-perfil.jpg') }}">

            <div class="ms-3">

                <h6 class="mb-0" id="chatNombre">
                Selecciona un chat
                </h6>

                <small class="text-muted">
                Mensajes
                </small>

            </div>

        </div>


        <!-- MENSAJES -->
        <div class="chat-box" id="chatBox">

        </div>



        <!-- INPUT MENSAJE -->
        <div class="input-chat">

            <div class="input-wrapper">

                <input id="mensajeInput"
                type="text"
                placeholder="Escribe un mensaje">

                <i class="material-icons" id="btnEnviar">
                send
                </i>

            </div>

        </div>

    </div>

</div>


<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<!-- JS DEL CHAT -->
<script src="{{ url_for('static', filename='chat.js') }}"></script>


</body>
</html>
