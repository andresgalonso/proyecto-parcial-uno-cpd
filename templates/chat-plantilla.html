<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat UI</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='estilo-plantilla.css') }}">

</head>


<body>

<div class="chat-container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="settings-tray">
            <img class="profile-image" src="{{ url_for('static', filename='recursos/logo-perfil.jpg') }}">
            <div class="d-flex align-items-center">
                <i class="material-icons" style="cursor:pointer;" onclick="socket.emit('conversaciones', {username: usuarioActual})" title="Ver Chats">cached</i>

                <i class="material-icons ms-2" style="cursor:pointer;" id="btnVerContactos" title="Ver Contactos">message</i>
                <div class="dropdown d-inline-block ms-2">
                    <i class="material-icons" data-bs-toggle="dropdown" style="cursor:pointer;" title="Opciones">more_vert</i>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#modalAgregarContacto">Agregar contacto</a></li>
                        <li><a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#modalCrearGrupo">Crear grupo</a></li>
                    </ul>
                </div>
            </div>
        </div>


        <div class="search-box">

            <div class="input-wrapper">

                <i class="material-icons">search</i>

                <input type="text" placeholder="Buscar">

            </div>

        </div>


        <!-- LISTA DE CONVERSACIONES -->
        <div class="chat-list" id="chatList">

        </div>

    </div>



    <!-- CHAT PRINCIPAL -->
    <div class="main-chat">

        <div class="chat-header">

            <img class="profile-image"
            src="{{ url_for('static', filename='recursos/logo-perfil.jpg') }}">

            <div class="ms-3">

                <h6 class="mb-0" id="chatNombre">
                Selecciona un chat
                </h6>

                <small class="text-muted">
                Mensajes
                </small>

            </div>

        </div>


        <!-- MENSAJES -->
        <div class="chat-box" id="chatBox">

        </div>



        <!-- INPUT MENSAJE -->
        <div class="input-chat">

            <div class="input-wrapper">

                <input id="mensajeInput"
                type="text"
                placeholder="Escribe un mensaje">

                <i class="material-icons" id="btnEnviar">
                send
                </i>

            </div>

        </div>

    </div>

</div>
<!-- AGREGAR CONTACTO -->
<div class="modal fade" id="modalAgregarContacto" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Agregar nuevo contacto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="text" id="inputNuevoContacto" class="form-control" placeholder="Escribe el nombre de usuario">
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btnGuardarContacto">Agregar</button>
      </div>

    </div>

  </div>

</div>
<!-- GRUPO -->
<div class="modal fade" id="modalCrearGrupo" tabindex="-1">

  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Crear nuevo grupo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="text" id="inputNombreGrupo" class="form-control mb-3" placeholder="Nombre del grupo (ej. Proyecto Final)">
        <input type="text" id="inputMiembrosGrupo" class="form-control" placeholder="Miembros separados por coma (ej. juan, maria)">
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btnGuardarGrupo">Crear Grupo</button>
      </div>

    </div>

  </div>

</div>

<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<!-- JS DEL CHAT -->
<script src="{{ url_for('static', filename='chat.js') }}"></script>


</body>
</html>
