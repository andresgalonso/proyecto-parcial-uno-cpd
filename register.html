<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="register.css">
</head>
<body>

<div class="register-wrapper">

    <!-- ── Panel izquierdo (pasos) ─────────────────────────────── -->
    <div class="panel-left">
        <div class="avatar-ring">
            <div class="avatar-placeholder">
                <i class="material-icons">person_add</i>
            </div>
        </div>
        <h2>Crea tu cuenta</h2>
        <p>Únete y empieza a chatear con todos</p>
    </div>

    <!-- ── Panel derecho (formulario) ─────────────────────────── -->
    <div class="panel-right">

        <div class="top-bar">
            <a href="login.html" class="back-btn">
                <i class="material-icons">arrow_back</i>
                Volver
            </a>
            <div class="top-icons">
                <i class="material-icons">cached</i>
                <i class="material-icons">more_vert</i>
            </div>
        </div>

        <h3>Crear cuenta</h3>
        <p class="subtitle">Completa los campos para registrarte</p>

        <div class="fields-grid">

            <div class="field">
                <label>Nombre</label>
                <div class="input-row">
                    <i class="material-icons">badge</i>
                    <input type="text" placeholder="Juan">
                </div>
            </div>

            <div class="field">
                <label>Apellido</label>
                <div class="input-row">
                    <i class="material-icons">badge</i>
                    <input type="text" placeholder="Pérez">
                </div>
            </div>

            <div class="field full">
                <label>Correo electrónico</label>
                <div class="input-row">
                    <i class="material-icons">email</i>
                    <input type="email" placeholder="tu@correo.com">
                </div>
            </div>

            <div class="field full">
                <label>Nombre de usuario</label>
                <div class="input-row">
                    <i class="material-icons">person</i>
                    <input type="text" placeholder="@usuario">
                </div>
            </div>

            <div class="field">
                <label>Contraseña</label>
                <div class="input-row">
                    <i class="material-icons">lock</i>
                    <input type="password" id="passInput" placeholder="••••••••">
                    <i class="material-icons toggle-pass" id="togglePass">visibility</i>
                </div>
                <div class="strength-bar" id="strengthBar">
                    <span></span><span></span><span></span><span></span>
                </div>
            </div>

            <div class="field">
                <label>Confirmar contraseña</label>
                <div class="input-row">
                    <i class="material-icons">lock_outline</i>
                    <input type="password" id="confirmInput" placeholder="••••••••">
                    <i class="material-icons toggle-pass" id="toggleConfirm">visibility</i>
                </div>
            </div>

        </div>

        <label class="terms-row">
            <input type="checkbox" id="termsCheck">
        </label>

        <button class="btn-register">
            <span>Crear cuenta</span>
            <i class="material-icons">send</i>
        </button>

        <p class="login-row">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>

    </div>

</div>

<script src="register.js"></script>
</body>
</html>
